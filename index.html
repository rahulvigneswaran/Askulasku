<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Asku Lasku — Say it in every language</title>
  <meta name="description" content="Type any phrase and watch it flip through 30+ languages in a satisfying split-flap display. Export as GIF or video.">
  <meta property="og:title" content="Asku Lasku — Say it in every language">
  <meta property="og:description" content="Type any phrase. Watch it bloom across 30+ languages.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <!-- Inter for UI, Instrument Serif for editorial heading, Noto family for all scripts -->
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600;700&family=Noto+Sans:wght@400;700&family=Noto+Sans+SC:wght@400;700&family=Noto+Sans+JP:wght@400;700&family=Noto+Sans+KR:wght@400;700&family=Noto+Sans+Arabic:wght@400;700&family=Noto+Sans+Devanagari:wght@400;700&family=Noto+Sans+Tamil:wght@400;700&family=Noto+Sans+Thai:wght@400;700&family=Noto+Sans+Hebrew:wght@400;700&family=Noto+Serif:wght@400;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ── Navigation ───────────────────────────────────────────────────────── -->
  <nav id="nav">
    <a href="index.html" class="logo">
      <span class="logo-primary">Asku Lasku</span>
      <span class="logo-secondary">ஆஸ்கு லாஸ்கு</span>
    </a>
    <div class="nav-right">
      <a href="about.html" class="nav-link">About</a>
      <button id="themeToggle" class="theme-btn" aria-label="Toggle theme">☽</button>
    </div>
  </nav>

  <!-- ── Main ─────────────────────────────────────────────────────────────── -->
  <main class="main">

    <!-- ── Idle: input ────────────────────────────────────────────────────── -->
    <div id="inputPanel">
      <h1 class="hero-heading">
        Say it in<br>
        <em class="serif">every language.</em>
      </h1>
      <p class="hero-sub">
        Type a word or phrase. Watch it flip through 30+ languages
        in a split-flap display — then export as GIF or video.
      </p>

      <div class="input-row">
        <input
          type="text"
          id="phraseInput"
          class="phrase-input"
          placeholder="love, peace, hello world…"
          maxlength="60"
          autocomplete="off"
          spellcheck="false"
          aria-label="Word or phrase to translate"
        >
        <button id="animateBtn" class="animate-btn" aria-label="Start animation">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
            <path d="M8 5v14l11-7z"/>
          </svg>
          Animate
        </button>
      </div>

      <div id="langBadges" aria-label="Supported languages"></div>
    </div>

    <!-- ── Loading ────────────────────────────────────────────────────────── -->
    <div id="loadingPanel" class="hidden">
      <div class="spin" role="progressbar" aria-label="Loading translations"></div>
      <p class="load-label">
        Translating into <strong id="loadCount">0</strong> languages
      </p>
      <div id="loadingItems" aria-live="polite"></div>
    </div>

    <!-- ── Board (always rendered) ───────────────────────────────────────── -->
    <div class="board-wrap">
      <canvas id="stage" role="img" aria-label="Split-flap translation display"></canvas>
    </div>

    <!-- ── Playback controls ─────────────────────────────────────────────── -->
    <div id="playbackPanel" class="hidden">

      <!-- Progress -->
      <div id="progressWrap">
        <div id="progressBar" role="progressbar" aria-valuemin="0" aria-valuemax="100">
          <div id="progressFill"></div>
        </div>
        <span id="langCounter" aria-live="polite">1 / 30</span>
      </div>

      <!-- Controls -->
      <div id="controls">
        <!-- Back -->
        <button id="backBtn" class="ctrl-btn" title="New phrase (Esc)" aria-label="Back to input">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
            <path d="M19 12H5M5 12L12 5M5 12L12 19"/>
          </svg>
        </button>

        <!-- Play / Pause -->
        <button id="playPauseBtn" class="ctrl-btn primary" title="Play / Pause (Space)" aria-label="Play or pause">
          <svg id="pauseIcon" width="15" height="15" viewBox="0 0 24 24" fill="currentColor">
            <rect x="6"  y="4" width="4" height="16" rx="1"/>
            <rect x="14" y="4" width="4" height="16" rx="1"/>
          </svg>
          <svg id="playIcon" width="15" height="15" viewBox="0 0 24 24"
               fill="currentColor" class="hidden">
            <path d="M8 5v14l11-7z"/>
          </svg>
        </button>

        <!-- Loop -->
        <button id="loopBtn" class="ctrl-btn" title="Loop" aria-label="Toggle loop" aria-pressed="false">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17 1l4 4-4 4"/><path d="M3 11V9a4 4 0 014-4h14"/>
            <path d="M7 23l-4-4 4-4"/><path d="M21 13v2a4 4 0 01-4 4H3"/>
          </svg>
        </button>

        <div class="spacer"></div>

        <!-- Export -->
        <div class="export-group">
          <button id="exportVideoBtn" class="export-btn" aria-label="Export video">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
              <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
              <polyline points="7 10 12 15 17 10"/>
              <line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
            Video
          </button>
          <button id="exportGifBtn" class="export-btn" aria-label="Export GIF">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
              <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
              <polyline points="7 10 12 15 17 10"/>
              <line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
            GIF
          </button>
        </div>
      </div>
    </div>

  </main>

  <!-- Toast -->
  <div id="toast" class="toast hidden" role="status" aria-live="polite"></div>

  <!-- Scripts -->
  <script src="vendor/gif.js"></script>
  <script src="js/languages.js"></script>
  <script src="js/stage.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
